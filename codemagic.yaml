workflows:
  ios-pwa:
    name: HSK Arabia iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Developer
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hskarabia.app
      vars:
        BUNDLE_ID: "com.hskarabia.app"
        XCODE_PROJECT: "HSK Arabia.xcodeproj"
        XCODE_SCHEME: "HSK Arabia"
    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "src/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
