workflows:
  ios-pwa:
    name: HSK Arabia iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        provisioning_profiles:
          - hsk_appstore
        certificates:
          - dist_cert
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
        BUILD_NUMBER: 2
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project "ios/App/App.xcodeproj"
      - name: Build iOS
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --build-number $BUILD_NUMBER \
            --archive-xcargs "CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER='HSK Arabia App Store' CODE_SIGN_IDENTITY='Apple Distribution' DEVELOPMENT_TEAM=9Z33JBXVCA" \
            --verbose
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
